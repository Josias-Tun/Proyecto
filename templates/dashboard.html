<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h2 class="mb-4">📦 Gestión de Pedidos</h2>

    <a class="btn btn-success mb-3" href="/crear">+ Nuevo Pedido</a>
    <a class="btn btn-secondary mb-3" href="/admin">Admin</a>
    <a class="btn btn-danger mb-3" href="/logout">Salir</a>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Cliente</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for p in pedidos %}
            <tr>
                <td>{{ p.cliente }}</td>
                <td>
                    <span class="badge bg-info">{{ p.estado }}</span>
                </td>
                <td>
                    <a class="btn btn-sm btn-primary" href="/seguimiento/{{ p._id }}">Ver</a>
                    <a class="btn btn-sm btn-danger" href="/cancelar/{{ p._id }}">Cancelar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
