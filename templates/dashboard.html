<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h5 class="text-muted">Usuario: {{ session['user'] }}</h5>
    <h2 class="mb-4">📦 Gestión de Pedidos</h2>

    <a class="btn btn-success mb-3" href="/crear">+ Nuevo Pedido</a>
    <a class="btn btn-secondary mb-3" href="/admin">Admin</a>
    <a class="btn btn-danger mb-3" href="/logout">Salir</a>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Cliente</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>

            {% if pedidos %}
                {% for p in pedidos %}
                <tr>
                    <td>{{ p.cliente }}</td>
                    <td>
                        <span class="badge 
                        {% if p.estado == 'Creado' %}bg-primary
                        {% elif p.estado == 'Cancelado' %}bg-danger
                        {% else %}bg-success
                        {% endif %}
                        ">
                            {{ p.estado }}
                        </span>
                    </td>
                    <td>
                        <a class="btn btn-sm btn-primary" href="/seguimiento/{{ p._id }}">Ver</a>
                        <a class="btn btn-sm btn-danger" href="/cancelar/{{ p._id }}">Cancelar</a>
                    </td>
                </tr>
                {% endfor %}
            {% else %}
                <tr>
                    <td colspan="3" class="text-center text-muted">
                        No tienes pedidos aún
                    </td>
                </tr>
            {% endif %}

        </tbody>
    </table>

</div>

</body>
</html>
