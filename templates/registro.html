<!DOCTYPE html>
<html>
<head>
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 300px;">
    <h3 class="text-center mb-3">Registro</h3>

    <form method="POST">
        <input class="form-control mb-2" name="username" placeholder="Usuario" required>
        <input class="form-control mb-3" name="password" type="password" placeholder="Contraseña" required>

        <button class="btn btn-success w-100">Crear cuenta</button>
    </form>

    <a href="/" class="btn btn-link mt-2">Volver al login</a>
</div>

</body>
</html>
