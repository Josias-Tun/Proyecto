<!DOCTYPE html>
<html>
<head>
    <title>Crear Pedido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">
        <h3>Nuevo Pedido</h3>

        <form method="POST">
            <input class="form-control mb-3" name="cliente" placeholder="Cliente" required>
            <input class="form-control mb-3" name="direccion" placeholder="Dirección" required>

            <button class="btn btn-success">Crear Pedido</button>
            <a href="/dashboard" class="btn btn-secondary">Volver</a>
        </form>
    </div>

</div>

</body>
</html>
